name: CI

on:
  pull_request:
    branches:
    - "**"
  push:
    branches:
    - master
    tags:
    - "*.*.*"
    - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
      with:
        version: v2.12.2
        args: --timeout=10m

  test-coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    - name: Run tests with coverage
      run: go test -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload to Codecov
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        files: coverage.out
        token: ${{ secrets.CODECOV_TOKEN }}

  govulncheck:
    name: Vulnerability check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    - name: Run govulncheck
      uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
      with:
        go-package: ./...
        repo-checkout: false

  release:
    name: Release binaries
    runs-on: ubuntu-latest
    needs: [lint, test-coverage, govulncheck]
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.actor == 'nektos/act'
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    - name: Release binaries
      if: github.actor != 'nektos/act'
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
      with:
        distribution: goreleaser
        version: "~> v2"
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    name: Build ${{ matrix.arch }} image
    runs-on: ubuntu-latest
    needs: release
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.actor == 'nektos/act'
    timeout-minutes: 20
    strategy:
      matrix:
        arch: [amd64, arm64]
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    # Build the image binary from the checked-out source so the published image
    # always matches this commit, instead of re-downloading a release asset that
    # could drift from the tagged SHA.
    - name: Build release binary from source
      run: |
        mkdir -p dist
        CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
          go build -trimpath -ldflags="-s -w" \
          -o "dist/k8s-mongo-labeler-sidecar-linux-${{ matrix.arch }}" ./

    - name: Set up QEMU
      if: matrix.arch != 'amd64'
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Log in to GitHub Container Registry
      if: github.actor != 'nektos/act'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set integration image ref
      id: image
      run: |
        if [[ "${GITHUB_ACTOR}" == "nektos/act" ]]; then
          echo "image_ref=mongo-labeler:ci-local" >> "$GITHUB_OUTPUT"
        else
          echo "image_ref=ghcr.io/${GITHUB_REPOSITORY,,}:sha-${GITHUB_SHA}-amd64" >> "$GITHUB_OUTPUT"
        fi

    - name: Extract Docker metadata
      if: github.actor != 'nektos/act'
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=tag,suffix=-${{ matrix.arch }}
          type=sha,prefix=sha-,format=long,suffix=-${{ matrix.arch }}
        annotations: |
          org.opencontainers.image.description=Kubernetes sidecar that detects MongoDB replica set primary and labels the pod with primary=true for service selection.

    - name: Build Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        file: ./Dockerfile.dist
        platforms: linux/${{ matrix.arch }}
        push: ${{ github.actor != 'nektos/act' }}
        load: ${{ github.actor == 'nektos/act' && matrix.arch == 'amd64' }}
        tags: ${{ github.actor == 'nektos/act' && steps.image.outputs.image_ref || steps.meta.outputs.tags }}
        labels: ${{ github.actor != 'nektos/act' && steps.meta.outputs.labels || '' }}
        annotations: ${{ github.actor != 'nektos/act' && steps.meta.outputs.annotations || '' }}

  manifest:
    name: Create manifest list
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 10
    permissions:
      packages: write

    steps:
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create manifest lists
      run: |
        IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
        SHA="sha-${GITHUB_SHA}"
        TAG="${GITHUB_REF#refs/tags/}"

        # Create :sha-<commit> manifest
        docker buildx imagetools create -t "${IMAGE}:${SHA}" \
          "${IMAGE}:${SHA}-amd64" "${IMAGE}:${SHA}-arm64"

        # Create :<tag> manifest
        docker buildx imagetools create -t "${IMAGE}:${TAG}" \
          "${IMAGE}:${TAG}-amd64" "${IMAGE}:${TAG}-arm64"

  integration-test:
    name: Integration test
    runs-on: ubuntu-latest
    needs: build-and-push
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.actor == 'nektos/act'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Log in to GitHub Container Registry
      if: github.actor != 'nektos/act'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull CI image
      if: github.actor != 'nektos/act'
      run: docker pull "${{ needs.build-and-push.outputs.image_ref }}"

    - name: Set up kubectl
      uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

    - name: Set up kind
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      with:
        cluster_name: kind-mongo-labeler
        version: v0.31.0
        install_only: true

    - name: Run integration test
      env:
        LABELER_IMAGE: ${{ needs.build-and-push.outputs.image_ref }}
        USE_PREBUILT_IMAGE: "true"
      run: ./test/integration/run.sh
