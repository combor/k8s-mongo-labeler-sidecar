apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongo-labeler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongo-labeler
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongo-labeler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mongo-labeler
subjects:
- kind: ServiceAccount
  name: mongo-labeler
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-bootstrap
data:
  start-mongo.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    mongod \
      --replSet rs0 \
      --bind_ip_all \
      --port 27017 \
      --dbpath /data/db \
      --logpath /proc/1/fd/1 \
      --logappend &
    mongod_pid="$!"

    if [[ "${HOSTNAME}" == "mongo-0" ]]; then
      for host in mongo-0.mongo-cluster mongo-1.mongo-cluster mongo-2.mongo-cluster; do
        until mongosh --quiet --host "${host}" --eval "db.adminCommand({ ping: 1 }).ok" >/dev/null 2>&1; do
          sleep 1
        done
      done

      if ! mongosh --quiet --eval "rs.status().ok" >/dev/null 2>&1; then
        mongosh --quiet --eval "rs.initiate({
          _id: 'rs0',
          members: [
            {_id: 0, host: 'mongo-0.mongo-cluster:27017'},
            {_id: 1, host: 'mongo-1.mongo-cluster:27017'},
            {_id: 2, host: 'mongo-2.mongo-cluster:27017'}
          ]
        })"
      fi
    fi

    wait "${mongod_pid}"
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-cluster
spec:
  clusterIP: None
  selector:
    role: mongo
  ports:
  - name: mongo
    port: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  selector:
    role: mongo
    primary: "true"
  ports:
  - name: mongo
    port: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
spec:
  serviceName: "mongo-cluster"
  replicas: 3
  selector:
    matchLabels:
      role: mongo
  template:
    metadata:
      labels:
        role: mongo
    spec:
      serviceAccountName: mongo-labeler
      # Seccomp profile configuration
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mongo
        image: mongo:8.0.23
        command: ["/bin/bash", "/scripts/start-mongo.sh"]
        # Hardening: drop all Linux capabilities and block privilege
        # escalation. mongod needs no capabilities (it binds 27017, a non-privileged
        # port). Full non-root + readOnlyRootFilesystem is a follow-up: it requires
        # an fsGroup for the emptyDir /data/db and a writable /tmp for mongosh.
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            # No CPU limit so the database is not throttled under load.
            memory: 1Gi
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-persistent-storage
          mountPath: /data/db
        - name: mongo-bootstrap
          mountPath: /scripts
          readOnly: true
      # Mongo labeler sidecar
      - name: labeler
        image: ghcr.io/combor/k8s-mongo-labeler-sidecar:0.6.2
        env:
        - name: LABEL_SELECTOR
          value: "role=mongo"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: MONGO_ADDRESS
          value: "localhost:27017"
        - name: K8S_REQUEST_TIMEOUT
          value: "10s"
        - name: LABEL_ALL
          value: "true"
        - name: DEBUG
          value: "false"
        # Security context for the sidecar
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      volumes:
      - name: mongo-persistent-storage
        emptyDir: {}
      - name: mongo-bootstrap
        configMap:
          name: mongo-bootstrap
          # 0644: the start script is read by bash, not executed directly.
          defaultMode: 0644
---
# NetworkPolicy restricting ingress to the MongoDB pods to TCP 27017 from pods in
# the same namespace. NOTE: this is only enforced by a CNI that implements
# NetworkPolicy (kind's default kindnet does not). The example mongod also runs
# WITHOUT authentication or TLS and is for demonstration only; enable Mongo
# auth/keyFile and TLS before exposing it in production.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongo
spec:
  podSelector:
    matchLabels:
      role: mongo
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - port: 27017
      protocol: TCP
